global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'keycloak'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['keycloak:9000']

  - job_name: 'ldap'
    static_configs:
      - targets: ['ldap-exporter:9330']

  - job_name: 'fastapi'
    static_configs:
      - targets: ['intranet-app:8000']
